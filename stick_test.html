<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xbox Gamepad Diagnostic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0e1117;
            --surface: #161b24;
            --surface2: #111820;
            --border: #252d3a;
            --accent: #00e5a0;
            --accent2: #00b3ff;
            --dim: #2a3344;
            --text: #c8d8e8;
            --muted: #657386;
            --danger: #ff4444;
            --warning: #ffaa00;
            --green: #44ee88;
            --red: #ff4466;
            --blue: #4a9eff;
            --yellow: #ffd84a
        }

        body {
            background: radial-gradient(circle at top, #141b27 0, #0e1117 45%, #090c11 100%);
            color: var(--text);
            font-family: Rajdhani, sans-serif;
            min-height: 100vh;
            padding: 20px 16px 38px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden
        }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            letter-spacing: .25em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 8px
        }

        #status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(22, 27, 36, .92);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 14px;
            width: 100%;
            max-width: 1040px
        }

        #status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted)
        }

        #status-dot.on {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent)
        }

        #status-text {
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        #input-count {
            color: var(--accent)
        }

        .main {
            display: grid;
            grid-template-columns: minmax(720px, 780px) 260px;
            gap: 16px;
            align-items: start;
            width: 100%;
            max-width: 1060px
        }

        .controller-wrap {
            position: relative;
            width: 760px;
            height: 470px;
            margin: 0 auto 12px
        }

        .side-panel {
            background: rgba(22, 27, 36, .82);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, .18)
        }

        #controller-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%
        }

        .trigger-zone {
            position: absolute;
            top: 24px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .trigger-zone.left {
            left: 42px
        }

        .trigger-zone.right {
            right: 42px
        }

        .trigger-label {
            font: 10px 'Share Tech Mono', monospace;
            color: var(--muted)
        }

        .trigger-track {
            width: 76px;
            height: 12px;
            background: var(--dim);
            border-radius: 999px;
            border: 1px solid var(--border);
            overflow: hidden
        }

        .trigger-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            transition: width .03s
        }

        .trigger-fill.r {
            background: var(--accent2);
            box-shadow: 0 0 8px var(--accent2)
        }

        .trigger-val {
            font: 10px 'Share Tech Mono', monospace;
            color: var(--accent);
            width: 30px
        }

        .trigger-val.r {
            color: var(--accent2)
        }

        .stick-overlay {
            position: absolute;
            width: 84px
        }

        .stick-overlay.left {
            left: 177px;
            top: 158px
        }

        .stick-overlay.right {
            left: 464px;
            top: 286px
        }

        .stick-ring {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: #0a0f16;
            position: relative;
            overflow: hidden
        }

        .stick-crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 1px;
            background: var(--dim)
        }

        .stick-crosshair.v {
            width: 1px;
            height: 90%
        }

        canvas.trail {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%
        }

        .stick-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            top: calc(50% - 6px);
            left: calc(50% - 6px);
            transition: transform .02s;
            z-index: 2
        }

        .stick-dot.r {
            background: var(--accent2);
            box-shadow: 0 0 10px var(--accent2)
        }

        .stick-active .stick-ring {
            border-color: var(--accent)
        }

        .stick-active.r .stick-ring {
            border-color: var(--accent2)
        }

        .stick-info {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
            font: 9px 'Share Tech Mono', monospace;
            color: var(--muted);
            width: 84px
        }

        .drift-badge {
            margin-top: 3px;
            font: 9px 'Share Tech Mono', monospace;
            text-align: center;
            width: 84px
        }

        .drift-none {
            color: var(--accent)
        }

        .drift-low,
        .drift-moderate {
            color: var(--warning)
        }

        .drift-severe {
            color: var(--danger)
        }

        .section-label {
            font: 10px 'Share Tech Mono', monospace;
            letter-spacing: .2em;
            color: var(--muted);
            text-transform: uppercase;
            margin: 2px 0 8px
        }

        .btn-track {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px
        }

        .btn-chip {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--surface2);
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: .04em;
            transition: .07s
        }

        .btn-chip .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border)
        }

        .btn-chip.on {
            border-color: var(--accent2);
            color: var(--accent2);
            background: #101820
        }

        .btn-chip.on .dot {
            background: var(--accent2);
            box-shadow: 0 0 7px var(--accent2)
        }

        .btn-chip.a.on {
            border-color: var(--green);
            color: var(--green);
            background: #0a2015
        }

        .btn-chip.a.on .dot {
            background: var(--green);
            box-shadow: 0 0 7px var(--green)
        }

        .btn-chip.b.on {
            border-color: var(--red);
            color: var(--red);
            background: #2a0515
        }

        .btn-chip.b.on .dot {
            background: var(--red);
            box-shadow: 0 0 7px var(--red)
        }

        .btn-chip.x.on {
            border-color: var(--blue);
            color: var(--blue);
            background: #0a2040
        }

        .btn-chip.x.on .dot {
            background: var(--blue);
            box-shadow: 0 0 7px var(--blue)
        }

        .btn-chip.y.on {
            border-color: var(--yellow);
            color: var(--yellow);
            background: #2a2305
        }

        .btn-chip.y.on .dot {
            background: var(--yellow);
            box-shadow: 0 0 7px var(--yellow)
        }

        .btn-chip.tested {
            border-color: var(--dim)
        }

        .tools {
            margin-top: 14px;
            display: grid;
            gap: 10px
        }

        .tool-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(17, 24, 32, .78);
            padding: 10px
        }

        .tool-title {
            font: 10px 'Share Tech Mono', monospace;
            letter-spacing: .16em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 8px
        }

        .row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap
        }

        .ui-btn {
            border: 1px solid var(--border);
            background: #0f1620;
            color: var(--text);
            border-radius: 8px;
            padding: 7px 9px;
            font: 700 12px Rajdhani, sans-serif;
            cursor: pointer
        }

        .ui-btn:hover,
        .ui-btn.active {
            border-color: var(--accent);
            color: var(--accent)
        }

        .select {
            background: #0f1620;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px;
            font: 12px 'Share Tech Mono', monospace
        }

        .metric {
            font: 11px 'Share Tech Mono', monospace;
            color: var(--muted);
            line-height: 1.7;
            margin-top: 7px
        }

        .metric b {
            color: var(--accent)
        }

        .axes-section {
            width: 100%;
            max-width: 1040px;
            margin-top: 12px
        }

        .axes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px
        }

        .axis-cell {
            background: rgba(22, 27, 36, .85);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px
        }

        .axis-name {
            font: 10px 'Share Tech Mono', monospace;
            color: var(--muted);
            margin-bottom: 5px
        }

        .axis-bar-wrap {
            height: 4px;
            background: var(--dim);
            border-radius: 2px;
            position: relative;
            margin-bottom: 5px
        }

        .axis-bar-wrap::after {
            content: '';
            position: absolute;
            left: 50%;
            top: -2px;
            width: 1px;
            height: 8px;
            background: var(--border)
        }

        .axis-bar {
            position: absolute;
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            top: 0
        }

        .axis-val {
            font: 11px 'Share Tech Mono', monospace;
            color: var(--text);
            font-weight: bold
        }

        @media(max-width:980px) {
            .main {
                grid-template-columns: 1fr
            }

            .controller-wrap {
                transform: scale(.92);
                transform-origin: top center;
                height: 435px
            }

            .side-panel {
                max-width: 760px;
                width: 100%;
                margin: auto
            }

            .btn-track {
                grid-template-columns: repeat(3, 1fr)
            }
        }
    </style>
</head>

<body>
    <h1>Xbox Gamepad Diagnostic</h1>
    <div id="status-bar">

    <div class="main">

                <path

                    font-family="Rajdhani" font-weight="700">RT</text>

                <circle cx="428" cy="205" r="12" fill="#111820" stroke="#1e2733" id="menu-btn" /><text x="428" y="209"
                    text-anchor="middle" font-size="12" fill="#3a4a5a" font-family="Rajdhani">☰</text>
                <circle cx="218" cy="200" r="45" fill="#0a1018" stroke="#1e2733" stroke-width="1.5" />
                <circle cx="506" cy="328" r="45" fill="#0a1018" stroke="#1e2733" stroke-width="1.5" />
                <g id="dpad">
                    <rect x="185" y="300" width="38" height="38" rx="5" fill="#0e1520" stroke="#1e2733" />
                    <rect x="191" y="277" width="26" height="26" rx="4" fill="#111820" stroke="#1e2733" id="dpad-up" />
                    <text x="204" y="294" text-anchor="middle" font-size="10" fill="#2a3a4a"
                        font-family="Rajdhani">▲</text>
                    <rect x="191" y="337" width="26" height="26" rx="4" fill="#111820" stroke="#1e2733" id="dpad-dn" />
                    <text x="204" y="354" text-anchor="middle" font-size="10" fill="#2a3a4a"
                        font-family="Rajdhani">▼</text>
                    <rect x="161" y="307" width="26" height="26" rx="4" fill="#111820" stroke="#1e2733" id="dpad-lt" />
                    <text x="174" y="324" text-anchor="middle" font-size="10" fill="#2a3a4a"
                        font-family="Rajdhani">◀</text>
                    <rect x="221" y="307" width="26" height="26" rx="4" fill="#111820" stroke="#1e2733" id="dpad-rt" />
                    <text x="234" y="324" text-anchor="middle" font-size="10" fill="#2a3a4a"
                        font-family="Rajdhani">▶</text>

                <circle cx="595" cy="196" r="15" fill="#111820" stroke="#1e2733" stroke-width="1.5" id="btn-y" /><text

                    font-weight="800">Y</text>
                <circle cx="625" cy="226" r="15" fill="#111820" stroke="#1e2733" stroke-width="1.5" id="btn-b" /><text
                    x="625" y="231" text-anchor="middle" font-size="13" fill="#882244" font-family="Rajdhani"
                    font-weight="800">B</text>
                <circle cx="595" cy="256" r="15" fill="#111820" stroke="#1e2733" stroke-width="1.5" id="btn-a" /><text
                    x="595" y="261" text-anchor="middle" font-size="13" fill="#226644" font-family="Rajdhani"
                    font-weight="800">A</text>
                <circle cx="565" cy="226" r="15" fill="#111820" stroke="#1e2733" stroke-width="1.5" id="btn-x" /><text
                    x="565" y="231" text-anchor="middle" font-size="13" fill="#224488" font-family="Rajdhani"

            </div>
            <div class="trigger-zone right">
                <div class="trigger-label">RT</div>
                <div class="trigger-track">
                    <div class="trigger-fill r" id="r2-fill"></div>
                </div>
                <div class="trigger-val r" id="r2-val">0%</div>
            </div>
            <div class="stick-overlay left" id="ls-wrap">
                <div class="stick-ring">

                        height="84"></canvas>

                    <div class="stick-crosshair"></div>
                    <div class="stick-crosshair v"></div><canvas class="trail" id="rs-trail" width="84"
                        height="84"></canvas>
                    <div class="stick-dot r" id="rs-dot"></div>
                </div>
                <div class="stick-info"><span id="rs-x">0.000</span><span id="rs-y">0.000</span></div>
                <div class="drift-badge drift-none" id="rs-drift">drift: —</div>
            </div>

        <aside class="side-panel">
            <div class="section-label">Buttons</div>
            <div class="btn-track" id="btn-track"></div>
            <div class="tools">
                <div class="tool-card">
                    <div class="tool-title">Analog Path</div>
                    <div class="row"><button class="ui-btn active" id="history-btn">History ON</button><button
                            class="ui-btn" id="clear-path-btn">Clear</button></div>
                </div>
                <div class="tool-card">
                    <div class="tool-title">Circularity Test</div>
                    <div class="row"><select class="select" id="circ-stick">
                            <option value="left">Left</option>
                            <option value="right">Right</option>
                        </select><button class="ui-btn" id="circ-btn">Start</button><button class="ui-btn"
                            id="circ-clear">Reset</button></div>
                    <div class="metric" id="circ-metric">Putar analog 360°. Max: <b>—</b><br>Coverage: <b>—</b> |
                        Circularity: <b>—</b></div>
                </div>
                <div class="tool-card">
                    <div class="tool-title">Vibration</div>
                    <div class="row"><button class="ui-btn vib" data-weak="0.25" data-strong="0.1">Soft</button><button
                            class="ui-btn vib" data-weak="0.45" data-strong="0.55">Hard</button><button
                            class="ui-btn vib" data-weak="1" data-strong="1">Full</button><button class="ui-btn"

    <div class="axes-section">
        <div class="section-label">Axes raw</div>
        <div class="axes-grid" id="axes-grid"></div>
    </div>
    <script>
        const BTN_DEFS = [{ n: 'A', svg: 'btn-a', cls: 'a' }, { n: 'B', svg: 'btn-b', cls: 'b' }, { n: 'X', svg: 'btn-x', cls: 'x' }, { n: 'Y', svg: 'btn-y', cls: 'y' }, { n: 'LB', svg: 'lb-shape' }, { n: 'RB', svg: 'rb-shape' }, { n: 'LT', svg: 'lt-shape' }, { n: 'RT', svg: 'rt-shape' }, { n: 'View', svg: 'view-btn' }, { n: 'Menu', svg: 'menu-btn' }, { n: 'LS' }, { n: 'RS' }, { n: 'D-Up', svg: 'dpad-up' }, { n: 'D-Down', svg: 'dpad-dn' }, { n: 'D-Left', svg: 'dpad-lt' }, { n: 'D-Right', svg: 'dpad-rt' }, { n: 'Xbox', svg: 'xbox-btn' }];
        let started = false, lsTrail = [], rsTrail = [], testedSet = new Set(), historyOn = true, circOn = false, circPts = [], vibTimer = null; const TRAIL_LEN = 90;
        function buildButtons() { const t = document.getElementById('btn-track'); t.innerHTML = ''; BTN_DEFS.forEach((b, i) => { const c = document.createElement('div'); c.className = 'btn-chip ' + (b.cls || ''); c.id = 'chip-' + i; c.innerHTML = `<span class="dot"></span>${b.n}`; t.appendChild(c) }) }
        function buildAxes(count) { const g = document.getElementById('axes-grid'); g.innerHTML = ''; for (let i = 0; i < count; i++)g.innerHTML += `<div class="axis-cell"><div class="axis-name">Axis ${i}</div><div class="axis-bar-wrap"><div class="axis-bar" id="ax-bar-${i}" style="left:50%;width:0%"></div></div><div class="axis-val" id="ax-val-${i}">0.0000</div></div>` }
        function getDrift(x, y) { const m = Math.hypot(x, y); if (m < .01) return { label: 'none', cls: 'drift-none', m }; if (m < .06) return { label: 'low', cls: 'drift-low', m }; if (m < .15) return { label: 'moderate', cls: 'drift-moderate', m }; return { label: 'SEVERE', cls: 'drift-severe', m } }
        function drawTrail(ctx, pts, color) { ctx.clearRect(0, 0, 84, 84); if (!historyOn || pts.length < 2) return; for (let i = 1; i < pts.length; i++) { const a = i / pts.length * .55; ctx.beginPath(); ctx.strokeStyle = color.replace('1)', a + ')'); ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.moveTo(pts[i - 1].x, pts[i - 1].y); ctx.lineTo(pts[i].x, pts[i].y); ctx.stroke() } }
        function updateStick(ax, ay, dotId, xId, yId, driftId, wrapId, trailId, arr, color) { const px = ax * 35, py = ay * 35; document.getElementById(dotId).style.transform = `translate(${px}px,${py}px)`; document.getElementById(xId).textContent = ax.toFixed(3); document.getElementById(yId).textContent = ay.toFixed(3); if (historyOn) { arr.push({ x: 42 + px, y: 42 + py }); if (arr.length > TRAIL_LEN) arr.shift() } const ctx = document.getElementById(trailId).getContext('2d'); drawTrail(ctx, arr, color); const d = getDrift(ax, ay), de = document.getElementById(driftId); de.textContent = `drift: ${d.label} (${(d.m * 100).toFixed(1)}%)`; de.className = 'drift-badge ' + d.cls; document.getElementById(wrapId).classList.toggle('stick-active', Math.abs(ax) > .05 || Math.abs(ay) > .05) }
        function svgHighlight(id, on, color = '#00b3ff') { const el = document.getElementById(id); if (!el) return; el.style.fill = on ? color : ''; el.style.stroke = on ? color : ''; el.style.filter = on ? 'url(#glow)' : '' }
        function updateCircularity(ax, ay) { if (!circOn) return; const stick = document.getElementById('circ-stick').value; if ((stick === 'left' && arguments[2]) || (stick === 'right' && !arguments[2])) return; const r = Math.hypot(ax, ay); if (r > .55) circPts.push({ x: ax, y: ay, a: Math.atan2(ay, ax), r }); if (circPts.length > 2500) circPts.shift(); const bins = new Array(36).fill(0); let max = 0, min = 9, sum = 0; circPts.forEach(p => { let bi = Math.floor(((p.a + Math.PI) / (Math.PI * 2)) * 36) % 36; bins[bi] = 1; max = Math.max(max, p.r); min = Math.min(min, p.r); sum += p.r }); const coverage = bins.reduce((a, b) => a + b, 0) / 36 * 100; const avg = circPts.length ? sum / circPts.length : 0; const circularity = max ? Math.max(0, 100 - (Math.abs(1 - avg) + Math.abs(1 - min)) * 50) : 0; document.getElementById('circ-metric').innerHTML = `Putar analog 360°. Max: <b>${(max * 100).toFixed(1)}%</b><br>Coverage: <b>${coverage.toFixed(0)}%</b> | Circularity: <b>${circularity.toFixed(0)}%</b>` }
        function getPad() { const pads = navigator.getGamepads ? navigator.getGamepads() : []; return [...pads].find(Boolean) }
        async function vibrate(weak, strong, duration = 500) { const gp = getPad(); const act = gp && (gp.vibrationActuator || gp.hapticActuators?.[0]); if (!act) { document.getElementById('vib-status').textContent = 'Status: vibration tidak didukung browser/controller'; return } try { if (act.playEffect) await act.playEffect('dual-rumble', { startDelay: 0, duration, weakMagnitude: weak, strongMagnitude: strong }); else if (act.pulse) await act.pulse(Math.max(weak, strong), duration); document.getElementById('vib-status').textContent = `Status: vibrate ${duration}ms` } catch (e) { document.getElementById('vib-status').textContent = 'Status: gagal vibrate' } }
        function update() { const gp = getPad(); if (gp) { const ax = gp.axes; const lx = ax[0] || 0, ly = ax[1] || 0, rx = ax[2] || 0, ry = ax[3] || 0; updateStick(lx, ly, 'ls-dot', 'ls-x', 'ls-y', 'ls-drift', 'ls-wrap', 'ls-trail', lsTrail, 'rgba(0,229,160,1)'); updateStick(rx, ry, 'rs-dot', 'rs-x', 'rs-y', 'rs-drift', 'rs-wrap', 'rs-trail', rsTrail, 'rgba(0,179,255,1)'); updateCircularity(lx, ly, true); updateCircularity(rx, ry, false); let lt = gp.buttons[6]?.value || 0, rt = gp.buttons[7]?.value || 0; document.getElementById('l2-fill').style.width = (lt * 100).toFixed(1) + '%'; document.getElementById('l2-val').textContent = (lt * 100).toFixed(0) + '%'; document.getElementById('r2-fill').style.width = (rt * 100).toFixed(1) + '%'; document.getElementById('r2-val').textContent = (rt * 100).toFixed(0) + '%'; ax.forEach((v, i) => { const bar = document.getElementById('ax-bar-' + i), val = document.getElementById('ax-val-' + i); if (!bar || !val) return; const pct = Math.abs(v) * 50; bar.style.left = v >= 0 ? '50%' : (50 - pct).toFixed(1) + '%'; bar.style.width = pct.toFixed(1) + '%'; bar.style.background = v < 0 ? '#ff4444' : '#00e5a0'; val.textContent = v.toFixed(4) }); gp.buttons.forEach((btn, i) => { const def = BTN_DEFS[i], chip = document.getElementById('chip-' + i); if (!def || !chip) return; const on = btn.pressed || btn.value > .5; if (on) testedSet.add(i); chip.className = 'btn-chip ' + (def.cls || '') + (on ? ' on' : (testedSet.has(i) ? ' tested' : '')); if (def.svg) { const colors = { a: '#116633', b: '#aa1133', x: '#1155cc', y: '#b9a330' }; svgHighlight(def.svg, on, colors[def.cls] || '#00b3ff') } }); document.getElementById('input-count').textContent = `${testedSet.size} / ${gp.buttons.length} inputs tested` } requestAnimationFrame(update) }
        window.addEventListener('gamepadconnected', e => { document.getElementById('status-dot').classList.add('on'); document.getElementById('status-text').textContent = e.gamepad.id; buildAxes(e.gamepad.axes.length); if (!started) { started = true; requestAnimationFrame(update) } }); window.addEventListener('gamepaddisconnected', () => { document.getElementById('status-dot').classList.remove('on'); document.getElementById('status-text').textContent = 'Controller terputus'; document.getElementById('input-count').textContent = '' });
        document.getElementById('history-btn').onclick = e => { historyOn = !historyOn; e.target.classList.toggle('active', historyOn); e.target.textContent = historyOn ? 'History ON' : 'History OFF'; if (!historyOn) { lsTrail = []; rsTrail = [] } }; document.getElementById('clear-path-btn').onclick = () => { lsTrail = []; rsTrail = [] }; document.getElementById('circ-btn').onclick = e => { circOn = !circOn; e.target.classList.toggle('active', circOn); e.target.textContent = circOn ? 'Stop' : 'Start' }; document.getElementById('circ-clear').onclick = () => { circPts = []; document.getElementById('circ-metric').innerHTML = 'Putar analog 360°. Max: <b>—</b><br>Coverage: <b>—</b> | Circularity: <b>—</b>' }; document.querySelectorAll('.vib').forEach(b => b.onclick = () => vibrate(+b.dataset.weak, +b.dataset.strong, 650)); document.getElementById('vib-inf').onclick = e => { if (vibTimer) { clearInterval(vibTimer); vibTimer = null; e.target.classList.remove('active'); e.target.textContent = 'Infinite'; vibrate(0, 0, 1); return } e.target.classList.add('active'); e.target.textContent = 'Inf ON'; vibrate(.7, .7, 900); vibTimer = setInterval(() => vibrate(.7, .7, 900), 850) }; document.getElementById('vib-stop').onclick = () => { if (vibTimer) clearInterval(vibTimer); vibTimer = null; document.getElementById('vib-inf').classList.remove('active'); document.getElementById('vib-inf').textContent = 'Infinite'; vibrate(0, 0, 1); document.getElementById('vib-status').textContent = 'Status: stop' };
        buildButtons();
    </script>
